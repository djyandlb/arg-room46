<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>◈ Intuitive</title>
<link rel="stylesheet" href="inner.css">
<style>
body{background:#050505;color:#664444;font:13px/1.9 "Courier New",monospace;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:30px 20px 60px;text-align:center}
.title{font-size:20px;color:#884444;letter-spacing:6px;margin-bottom:20px;text-shadow:0 0 10px rgba(136,68,68,0.1)}
.sub{color:#553333;font-size:10px;margin-bottom:30px;letter-spacing:2px}

/* 谜题区域 */
.puzzle-stage{
  margin:20px 0;padding:20px;
  border:1px solid #2A0A0A;background:rgba(10,5,5,0.3);
  min-height:200px;
}

.puzzle-text{color:#774444;font-size:12px;line-height:2.2;margin:12px 0}
.puzzle-text .hl{color:#AA4444}
.puzzle-text .dim{color:#442222}
.puzzle-text .code{color:#885544;font-family:monospace;letter-spacing:2px;font-size:13px}

.puzzle-input{
  background:rgba(10,5,5,0.6);border:1px solid #331111;
  color:#884444;font:13px "Courier New",monospace;
  padding:8px 12px;width:200px;text-align:center;
  outline:none;transition:border 0.3s;
  margin:10px 0;
}
.puzzle-input:focus{border-color:#553333}

.puzzle-btn{
  display:inline-block;padding:6px 24px;margin:6px 4px;
  background:transparent;border:1px solid #331111;
  color:#774444;font:11px "Courier New",monospace;
  cursor:pointer;transition:all 0.3s;
}
.puzzle-btn:hover{color:#AA4444;border-color:#553333}
.puzzle-btn:disabled{opacity:0.3;cursor:default}

.feedback{
  min-height:30px;margin:10px 0;
  font-size:11px;color:#553333;opacity:0;transition:opacity 0.5s;
}
.feedback.show{opacity:1}
.feedback.ok{color:#448844}
.feedback.err{color:#884444}
.feedback.win{color:#AA4444;font-size:14px;font-weight:bold;text-shadow:0 0 10px rgba(170,68,68,0.3)}

/* 主很中意你 */
#grantPanel{display:none;margin:20px 0;padding:24px;border:1px solid #442222;background:rgba(50,10,10,0.1)}
#grantPanel.show{display:block}
#grantPanel .bless{color:#AA4444;font-size:16px;letter-spacing:4px;margin-bottom:12px;text-shadow:0 0 15px rgba(170,68,68,0.2)}
#grantPanel .grant-msg{color:#664444;font-size:11px;line-height:2}
#grantPanel .grant-msg .hl{color:#AA4444}

.clue-hidden{
  color:#000;background:#000;cursor:pointer;padding:0 2px;
  transition:color 0.3s;
}
.clue-hidden.revealed{color:#fff}

.footer{color:#2A0A0A;font-size:9px;margin-top:30px}
</style>
<script src="../js/search.js"></script>
</head>
<body>
<div class="topbar">
  <div class="logo" onclick="safeNavigate('index.html')">◈ <span>回声</span>茶馆</div>
  <a href="#" onclick="history.back();return false;" class="back-btn">← 返回</a>
  <div class="nav"><a href="index.html">首页</a></div>
</div>
<div class="search-bar"><input type="text" id="search-input" placeholder="搜索…"><button id="search-btn">搜索</button></div>
<div class="container">

<div class="title">◈ Intuitive</div>
<div class="sub">直 觉 · 洞 察 · 剖 析</div>

<div class="puzzle-stage" id="puzzleStage">

  <!-- 阶段1：初始谜面 -->
  <div id="phase1">
    <div class="puzzle-text">
      我在剖析你。<br>
      但你也在剖析我。<br>
      <span class="dim">我们之间隔着一层东西。</span>
    </div>
    <div class="puzzle-text dim" style="font-size:10px;">
      层数：<span class="code" id="layerCount">46</span><br>
      <span class="code">你 看 到 的 不 是 全 部</span>
    </div>
    <div class="puzzle-text dim" style="font-size:10px;margin-top:16px;">
      试着点击你认为可疑的地方。
    </div>
  </div>

  <!-- 阶段2：点击发现 -->
  <div id="phase2" style="display:none;">
    <div class="puzzle-text">
      你发现了隐藏在文字之下的东西。<br>
      <span class="dim">但这还不够。</span>
    </div>
    <div class="puzzle-text" style="font-size:11px;color:#553333;line-height:2.6;">
      三层之中藏着三个碎片。<br>
      第一片：<span class="clue-hidden" onclick="revealClue(this, 'INT')">████</span><br>
      第二片：<span class="clue-hidden" onclick="revealClue(this, 'U')">██</span><br>
      第三片：<span class="clue-hidden" onclick="revealClue(this, 'ITIVE')">██████</span>
    </div>
    <div class="puzzle-text dim" style="font-size:10px;">
      全部点亮后——你就看到了答案。
    </div>
  </div>

  <!-- 阶段3：输入答案 -->
  <div id="phase3" style="display:none;">
    <div class="puzzle-text">
      我已剖析你。<br>
      现在——<span class="hl">你剖析我。</span>
    </div>
    <div class="puzzle-text dim" style="font-size:10px;margin-bottom:10px;">
      输入你看到的完整单词：
    </div>
    <input class="puzzle-input" id="puzzleAnswer" type="text" placeholder="INTUITIVE" maxlength="20">
    <div>
      <button class="puzzle-btn" onclick="checkAnswer()">◈ 提交</button>
    </div>
    <div class="feedback" id="puzzleFeedback"></div>
  </div>

</div>

<!-- 授权面板 -->
<div id="grantPanel">
  <div class="bless">◈ 主 很 中 意 你 ◈</div>
  <div class="grant-msg">
    你已获取 <span class="hl">inner 管理员权限</span>。<br>
    现在你可以访问管理终端了。<br>
    <span class="dim">——你记得自己是了。</span>
  </div>
</div>

<div class="footer">◈ Intuitive · 剖析 · 洞见</div>

</div>

<script>
var phase = 1;
var cluesRevealed = 0;

function goToPhase2(){
  document.getElementById('phase1').style.display = 'none';
  document.getElementById('phase2').style.display = 'block';
  phase = 2;
  console.log('%c◈ 你发现了隐藏层。', 'color:#553333;font-size:11px');
}

function goToPhase3(){
  document.getElementById('phase2').style.display = 'none';
  document.getElementById('phase3').style.display = 'block';
  phase = 3;
  console.log('%c◈ 三个碎片已集齐。拼出答案。', 'color:#664444;font-size:11px');
}

function revealClue(el, word){
  if(el.classList.contains('revealed')) return;
  el.classList.add('revealed');
  el.textContent = word;
  cluesRevealed++;
  if(cluesRevealed >= 3 && phase === 2){
    setTimeout(goToPhase3, 600);
  }
}

// 点击谜面触发阶段2
document.querySelector('#phase1 .puzzle-text').addEventListener('click', function(e){
  if(phase === 1) goToPhase2();
});

// 检查答案
function checkAnswer(){
  var val = document.getElementById('puzzleAnswer').value.trim().toUpperCase();
  var fb = document.getElementById('puzzleFeedback');

  if(val === ''){
    fb.textContent = '输入你的答案。';
    fb.className = 'feedback show';
    return;
  }

  // 正确答案：INTUITIVE
  if(val === 'INTUITIVE'){
    fb.textContent = '◈ 正确。你看到了。';
    fb.className = 'feedback show win';
    document.getElementById('puzzleAnswer').disabled = true;
    // 授予权限
    try {
      localStorage.setItem('echo_inner_admin', 'true');
    } catch(e) {}
    // 显示授权面板
    setTimeout(function(){
      document.getElementById('grantPanel').classList.add('show');
      document.getElementById('grantPanel').scrollIntoView({behavior:'smooth', block:'center'});
      console.log('%c◈ 主很中意你。', 'color:#AA4444;font-size:16px;font-weight:bold');
      console.log('%c◈ 管理员权限已激活。', 'color:#884444;font-size:12px');
    }, 1200);
  } else {
    fb.textContent = '不对。再想想。三层黑底词连起来是什么？';
    fb.className = 'feedback show err';
  }
}

console.log('%c◈ Intuitive', 'color:#884444;font-size:14px;font-weight:bold');
console.log('%c◈ 我在剖析你。你也在剖析我。', 'color:#553333;font-size:11px');
console.log('%c◈ 答案不在表面之下——在表面与表面的缝隙里。', 'color:#442222;font-size:10px');
</script>
</body>
</html>
