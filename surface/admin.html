<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>站务管理 · 回声茶馆</title>
<style>
/* ═════════════════════════════════════════
   表论坛统一 CSS · 千禧年 Y2K 论坛风格
   包含所有UI组件 + 动效
   ═════════════════════════════════════════ */

/* ── 全局重置 ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font: 12px/1.6 Verdana, "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #F0F0F0 0%, #E8ECF0 100%); color: #333; min-height: 100vh; }
a { color: #0000CC; text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: #0D3050; color: #fff; }

/* ── 顶栏 ── */
.topbar { background: #0D3050; padding: 6px 16px; display: flex; align-items: center; gap: 24px; border-bottom: 2px solid #0A2440; flex-wrap: wrap; }
.topbar .logo { font: bold 18px "Times New Roman", serif; color: #FFD700; letter-spacing: 2px; cursor: pointer; text-shadow: 1px 1px 0 #000; animation: logoGlow 3s ease-in-out infinite; }
@keyframes logoGlow { 0%,100% { text-shadow: 1px 1px 0 #000, 0 0 0 rgba(255,215,0,0); } 50% { text-shadow: 1px 1px 0 #000, 0 0 6px rgba(255,215,0,0.3); } }
.topbar .logo span { color: #8AB8D9; }
.topbar .nav { display: flex; gap: 2px; }
.topbar .nav a { color: #A0C8E0; font-size: 11px; margin: 0 10px; transition: color 0.2s; }
.topbar .nav a:hover { color: #fff; text-decoration: underline; }

.topbar .back-btn{
  display:inline-block;
  padding:2px 10px;
  margin-left:10px;
  font:11px Verdana,sans-serif;
  color:#A0C8E0;
  border:1px solid #1A4A70;
  background:#0D3050;
  cursor:pointer;
  text-decoration:none;
  line-height:1.6;
  transition:all 0.2s;
}
.topbar .back-btn:hover{
  color:#fff;
  border-color:#8AB8D9;
  background:#1A4A70;
}

.topbar .user-info { margin-left: auto; font-size: 10px; color: #7A9BB5; white-space: nowrap; }
.topbar .user-info a { color: #8AB8D9; }
.topbar .user-info a:hover { color: #fff; }

/* ── 搜索栏 ── */
.search-bar { background: #F0F2F5; padding: 10px 16px; border-bottom: 1px solid #C0C0C0; display: flex; gap: 8px; align-items: center; }
.search-bar input { flex: 1; max-width: 460px; padding: 5px 10px; border: 1px solid #A0A0A0; font: 11px Verdana, sans-serif; background: #fff; transition: border 0.3s; }
.search-bar input:focus { border-color: #0D3050; outline: none; }
.search-bar button { padding: 5px 16px; background: #0D3050; color: #fff; border: 1px solid #0A2440; cursor: pointer; font: 11px Verdana, sans-serif; transition: all 0.2s; }
.search-bar button:hover { background: #1A4A70; transform: scale(1.02); }

/* ── 搜索历史 ── */
.search-history {
  position: fixed;
  left: 24px;
  top: 50%;
  transform: translateY(-50%);
  width: 280px;
  max-height: 65vh;
  overflow-y: auto;
  background: #F8F8F0;
  border: 1px solid #D0C8A0;
  padding: 7px 12px;
  font: 10px Verdana;
  display: none;
  z-index: 999;
}
@media(max-width:768px){
  .search-history{position:relative;left:auto;top:auto;transform:none;width:auto;margin:8px 16px;max-height:none;z-index:auto}
}
}
@media(max-width:768px){
  .search-history{position:relative;left:auto;top:auto;width:auto;margin:8px 16px;max-height:none;z-index:auto;box-shadow:none}
}
.search-history h3 { font-size: 11px; color: #8B7355; margin-bottom: 4px; border-bottom: 1px solid #E0D8C0; padding-bottom: 4px; }
.search-history .entry { color: #666; padding: 2px 0; border-bottom: 1px dotted #E8E0D0; }
.search-history .entry .keyword { color: #333; font-weight: bold; }
.search-history .entry .found { color: #8B0000; }

/* ── 容器 ── */
.container { max-width: 920px; margin: 0 auto; padding: 8px 16px; animation: fadeIn 0.4s ease-out; ;}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── 面包屑 ── */
.breadcrumb { font-size: 10px; color: #888; margin-bottom: 8px; padding: 4px 0; }
.breadcrumb a { color: #0000CC; }

/* ── 统计横幅 ── */
.stats-banner { background: #F8F8F8; border: 1px solid #D0D0D0; padding: 8px 12px; margin-bottom: 8px; font: 10px Verdana; color: #666; text-align: center; }
.stats-banner b { color: #333; }
.stats-banner .highlight { color: #8B0000; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* ── 版块 ── */
.category { background: #fff; border: 1px solid #C0C0C0; margin-bottom: 8px; animation: fadeIn 0.4s ease-out; }
.category-header { background: #1A4A70; color: #fff; padding: 6px 12px; font: bold 11px Verdana; letter-spacing: 1px; display: flex; justify-content: space-between; }
.category-header .count { font-weight: normal; font-size: 10px; color: #8AB8D9; }
.category.archived { opacity: 0.65; }

/* ── 帖子行 ── */
.thread-row { display: flex; align-items: center; padding: 6px 12px; border-bottom: 1px solid #E8E8E8; cursor: pointer; transition: all 0.15s; }
.thread-row:last-child { border-bottom: none; }
.thread-row:hover { background: #F0F6FF; transform: translateX(2px); }
.thread-row .icon { width: 20px; height: 20px; margin-right: 10px; flex-shrink: 0; font-size: 10px; text-align: center; line-height: 20px; border: 1px solid #D0D0D0; transition: transform 0.2s; }
.thread-row:hover .icon { transform: scale(1.15); }
.thread-row .icon.pin { background: #FFF8E0; border-color: #E0C800; }
.thread-row .icon.hot { background: #FFE8E8; border-color: #E0A0A0; color: #CC0000; }
.thread-row .icon.normal { background: #E8F0FF; border-color: #A0C0E0; }
.thread-row .icon.lock { background: #E8E8E8; border-color: #C0C0C0; color: #999; }
.thread-row .main { flex: 1; min-width: 0; }
.thread-row .main .title { font-size: 12px; color: #0000CC; }
.thread-row:hover .main .title { text-decoration: underline; }
.thread-row .main .title .badge { font-size: 9px; padding: 1px 5px; margin-right: 4px; font-weight: bold; }
.thread-row .main .title .badge.pin { background: #FFF8E0; color: #A08600; }
.thread-row .main .title .badge.hot { background: #FFE0E0; color: #CC0000; }
.thread-row .main .meta { font-size: 10px; color: #888; margin-top: 1px; }
.thread-row .stat { text-align: center; margin: 0 12px; flex-shrink: 0; min-width: 40px; }
.thread-row .stat .num { font-size: 11px; font-weight: bold; color: #444; }
.thread-row .stat .label { font-size: 9px; color: #999; }
.thread-row .last { font-size: 10px; color: #888; text-align: right; flex-shrink: 0; min-width: 90px; }
.thread-row .last .author { color: #0000CC; }

/* ── 帖子卡片 ── */
.thread-card { background: #fff; border: 1px solid #C0C0C0; animation: fadeIn 0.4s ease-out; }
.post { padding: 14px 18px; border-bottom: 1px solid #E8E8E8; display: flex; gap: 12px; }
.post:last-child { border-bottom: none; }
.post .avatar { width: 44px; height: 44px; background: #E0E4E8; border: 1px solid #D0D0D0; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #666; transition: transform 0.2s; }
.post:hover .avatar { transform: scale(1.05); }
.post .content { flex: 1; min-width: 0; }
.post .content .header { display: flex; justify-content: space-between; font-size: 10px; color: #999; margin-bottom: 4px; }
.post .content .header .author { font-weight: bold; color: #0000CC; font-size: 11px; }
.post .content .body { font-size: 12px; line-height: 1.7; }
.post .content .body p { margin-bottom: 8px; }
.post .content .body .code-box { background: #F4F4F0; border: 1px solid #E0E0E0; padding: 10px 12px; font-family: monospace; font-size: 10px; margin: 8px 0; color: #555; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.post .content .sig { margin-top: 8px; padding-top: 6px; border-top: 1px dotted #E0E0E0; font-size: 10px; color: #BBB; }

/* ── 回复区 ── */
.reply-form { padding: 12px 18px; background: #F8F8F8; border-top: 1px solid #E8E8E8; }
.reply-form textarea { width: 100%; min-height: 50px; padding: 8px; border: 1px solid #D0D0D0; font: 11px Verdana, sans-serif; transition: border 0.3s; }
.reply-form textarea:focus { border-color: #0D3050; outline: none; }
.reply-form .btn { margin-top: 6px; padding: 4px 20px; background: #D0D0D0; border: 2px solid #A0A0A0; font: 11px Verdana, sans-serif; cursor: pointer; transition: all 0.2s; }
.reply-form .btn:hover { background: #E0E0E0; border-color: #808080; transform: scale(1.02); }

/* ── 图片占位 ── */
.img-ph { background: #F4F4F0; border: 1px solid #E0E0E0; padding: 12px; text-align: center; margin: 8px 0; font-size: 10px; color: #999; }

/* ── 功能框（登录/注册/FAQ用）── */
.box { background: #fff; border: 1px solid #C0C0C0; padding: 24px; margin-bottom: 12px; animation: fadeIn 0.4s ease-out; }
.box h2 { font-size: 14px; color: #0D3050; border-bottom: 1px solid #E0E0E0; padding-bottom: 8px; margin-bottom: 16px; }
.box p { font-size: 12px; line-height: 1.7; margin-bottom: 8px; color: #666; }
.box .timeline { margin: 16px 0; padding: 0; list-style: none; font-size: 10px; color: #888; line-height: 1.8; }
.box .timeline li { padding: 4px 0; border-bottom: 1px dotted #E8E8E8; }
.box .note { background: #F8F8F0; border: 1px solid #E0D8C0; padding: 12px; margin: 12px 0; font-size: 11px; color: #8B7355; line-height: 1.6; }

/* ── 弹窗系统 ── */
.modal-overlay, .settings-overlay, .confirm-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; display: none; align-items: center; justify-content: center; }
.modal-overlay.show, .settings-overlay.show, .confirm-overlay.show { display: flex; }
.modal-overlay.show .modal-box, .settings-overlay.show .settings-box, .confirm-overlay.show .confirm-box { animation: modalPop 0.25s ease-out; }
@keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-box, .settings-box, .confirm-box { background: #F0F0F0; border: 3px solid #0D3050; width: 340px; max-width: 90%; box-shadow: 4px 4px 12px rgba(0,0,0,0.3); font-family: Verdana, sans-serif; }
.modal-box .modal-titlebar, .settings-box .modal-titlebar, .confirm-box .modal-titlebar { background: #0D3050; color: #fff; padding: 6px 10px; font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
.modal-box .modal-titlebar .modal-close-btn, .settings-box .modal-titlebar .modal-close-btn, .confirm-box .modal-titlebar .modal-close-btn { width: 16px; height: 16px; background: #C0C0C0; border: 1px solid #A0A0A0; text-align: center; line-height: 14px; cursor: pointer; font-size: 10px; color: #333; font-family: Verdana; }
.modal-box .modal-titlebar .modal-close-btn:hover, .settings-box .modal-titlebar .modal-close-btn:hover, .confirm-box .modal-titlebar .modal-close-btn:hover { background: #CC0000; color: #fff; }
.modal-box .modal-body, .settings-box .modal-body, .confirm-box .modal-body { padding: 20px 16px; font-size: 11px; line-height: 1.6; color: #333; text-align: center; min-height: 60px; }
.modal-box .modal-footer, .settings-box .modal-footer, .confirm-box .modal-footer { border-top: 1px solid #D0D0D0; padding: 8px; text-align: center; }
.modal-box .modal-footer .modal-btn, .settings-box .modal-footer .modal-btn, .confirm-box .modal-footer .modal-btn { padding: 4px 24px; background: #D0D0D0; border: 2px solid #A0A0A0; font: 11px Verdana; cursor: pointer; transition: all 0.2s; }
.modal-box .modal-footer .modal-btn:hover, .settings-box .modal-footer .modal-btn:hover, .confirm-box .modal-footer .modal-btn:hover { background: #E0E0E0; border-color: #808080; }

/* ── 右下角广告 ── */
.ad-corner { position: fixed; bottom: 16px; right: 16px; width: 240px; z-index: 999; border: 2px solid #C0C0C0; background: #FFFFF0; font-family: Verdana, sans-serif; box-shadow: 3px 3px 8px rgba(0,0,0,0.2); }
.ad-corner .ad-close { position: absolute; top: -10px; right: -10px; width: 20px; height: 20px; background: #E0E0E0; border: 1px solid #A0A0A0; border-radius: 10px; text-align: center; line-height: 18px; font-size: 10px; cursor: pointer; color: #666; }
.ad-corner .ad-close:hover { background: #CC0000; color: #fff; }
.ad-corner .ad-body { padding: 16px; text-align: center; }
.ad-corner .ad-body .ad-visitor { font-size: 14px; font-weight: bold; color: #CC0000; margin-bottom: 6px; }
.ad-corner .ad-body .ad-user { font-size: 11px; color: #333; margin-bottom: 8px; }
.ad-corner .ad-body .ad-user em { color: #006600; font-style: normal; font-weight: bold; }
.ad-corner.hidden { display: none; }
@media (max-width: 640px) { .ad-corner { display: none; } }

/* ── 页脚 ── */
.page-footer { text-align: center; padding: 20px 0; font-size: 10px; color: #999; border-top: 1px solid #D0D0D0; margin-top: 16px; }
.page-footer .diamond { color: #CCC; letter-spacing: 3px; }
.page-footer .disclaimer { margin-top: 8px; font-size: 9px; color: #B0B0B0; }

/* ── 通用按钮禁用 ── */
.btn-disabled { width: 100%; padding: 10px; background: #E0E0E0; color: #999; border: 1px solid #C0C0C0; font: 11px Verdana; text-align: center; cursor: not-allowed; margin-top: 16px; }

/* ── 响应式 ── */
@media (max-width: 640px) {
  .container { padding: 4px 8px; }
  .post { padding: 10px 12px; gap: 8px; }
  .post .avatar { width: 32px; height: 32px; font-size: 12px; }
  .topbar { gap: 8px; padding: 4px 8px; }
  .topbar .logo { font-size: 14px; }
  .topbar .nav a { font-size: 10px; margin: 0 4px; }
  .search-bar { padding: 6px 8px; flex-wrap: wrap; }
  .search-bar input { max-width: 100%; }
  .thread-row { padding: 4px 8px; flex-wrap: wrap; }
  .thread-row .last { min-width: 60px; }
}
</style>
<script src="../js/search.js"></script>
<script>
/* ── 管理员权限检查 ── */

<body>

</div>

<!-- ── 管理后台内容 ── -->
<div class="container">

<div class="breadcrumb">
  <a href="../forum.html">回声茶馆</a> &gt; 站务管理
</div>

<div style="display:flex;gap:12px;">

  <!-- 侧边栏 -->
  <div style="width:160px;flex-shrink:0;background:#fff;border:1px solid #C0C0C0;align-self:flex-start;">
    <div class="menu-item active" style="padding:8px 12px;border-bottom:1px solid #E8E8E8;cursor:pointer;font-size:11px;color:#fff;background:#0D3050;font-weight:bold;" onclick="switchPanel('dashboard')"><span style="margin-right:6px;">📊</span>仪表盘</div>
    <div class="menu-item" style="padding:8px 12px;border-bottom:1px solid #E8E8E8;cursor:pointer;font-size:11px;color:#444;" onclick="switchPanel('users')"><span style="margin-right:6px;">👥</span>用户管理</div>
    <div class="menu-item" style="padding:8px 12px;border-bottom:1px solid #E8E8E8;cursor:pointer;font-size:11px;color:#444;" onclick="switchPanel('posts')"><span style="margin-right:6px;">📄</span>帖子管理</div>

    <div class="menu-item" style="padding:8px 12px;cursor:pointer;font-size:11px;color:#CC0000;" onclick="switchPanel('lamp46')"><span style="margin-right:6px;">⚡</span>LAMP46</div>
  </div>

  <!-- 主内容 -->
  <div class="main-content" id="main-content" style="flex:1;background:#fff;border:1px solid #C0C0C0;padding:16px;min-height:500px;">
    <div class="page-title" style="font-size:14px;font-weight:bold;color:#0D3050;border-bottom:2px solid #0D3050;padding-bottom:6px;margin-bottom:12px;">📊 仪表盘</div>
    <div id="panel-content"><!-- 由JS填充 --></div>

<script>
/* ── 面板数据 ── */
var PANEL_NAMES = {
  dashboard: '仪表盘', users: '用户管理', posts: '帖子管理',
  drafts: '草稿箱', logs: '系统日志', lamp46: 'LAMP46'
};

/* ── 切换面板 ── */
function switchPanel(panel) {
  var items = document.querySelectorAll('.menu-item');
  for (var i = 0; i < items.length; i++) {
    var text = items[i].textContent.replace(/[📊👥📄📝📋⚡]/g,'').trim();
    items[i].style.background = (text.indexOf(PANEL_NAMES[panel]) !== -1) ? '#0D3050' : '#fff';
    items[i].style.color = (text.indexOf(PANEL_NAMES[panel]) !== -1) ? '#fff' : '#444';
    items[i].style.fontWeight = (text.indexOf(PANEL_NAMES[panel]) !== -1) ? 'bold' : 'normal';
  }
  renderPanel(panel);
  setTimeout(function() {
    if (panel === 'users') initMysteryUser();
  }, 50);
}

/* ── 渲染面板 ── */
function renderPanel(panel) {
  var titleEl = document.querySelector('.page-title');
  var contentEl = document.getElementById('panel-content');
  var html = '';

  if (panel === 'dashboard') {
    titleEl.textContent = '📊 仪表盘';
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;">';
    html += '<div style="border:1px solid #E0E0E0;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#0D3050;">46,046</div><div style="font-size:10px;color:#888;margin-top:2px;">总帖子数</div></div>';
    html += '<div style="border:1px solid #E0E0E0;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#0D3050;">4,604</div><div style="font-size:10px;color:#888;margin-top:2px;">总会员数</div></div>';
    html += '<div style="border:1px solid #E8C0C0;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#CC0000;">46</div><div style="font-size:10px;color:#888;margin-top:2px;">异常帖子</div></div>';
    html += '<div style="border:1px solid #E8C0C0;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:bold;color:#CC0000;">46</div><div style="font-size:10px;color:#888;margin-top:2px;">隐藏版块</div></div>';
    html += '</div>';

    html += '<div style="margin-bottom:16px;"><h3 style="font-size:11px;color:#444;border-bottom:1px solid #E0E0E0;padding-bottom:4px;margin-bottom:8px;">⚠ 系统警告</h3>';
    html += '<div style="font-size:11px;line-height:1.8;">';

/* ── 神秘用户逐字揭示 ── */
function initMysteryUser() {
  var nl = document.getElementById('mysteryNoteLink');
  if (!nl) return;
  var revealed = false;
  nl.addEventListener('mouseenter', function() {
    if (revealed) return;
    revealed = true;
    var nameEl = document.getElementById('mysteryName');
    var msg = '这里是建议，是规劝，别一意孤行……';
    var idx = 0;
    var iv = setInterval(function() {
      if (idx < msg.length) {
        var arr = nameEl.textContent.split('');
        arr[idx] = msg[idx];
        nameEl.textContent = arr.join('');
        idx++;
      } else {
        clearInterval(iv);
        nameEl.textContent = msg;
        var pw = document.getElementById('mysteryPw');
        if (pw) pw.textContent = '——';
        var role = document.getElementById('mysteryRole');
        if (role) role.innerHTML = '<span style="background:#333;color:#fff;font-size:8px;padding:1px 6px;border-radius:2px;">访客</span>';
        var st = document.getElementById('mysteryStatus');
        if (st) st.textContent = '在站';
        var la = document.getElementById('mysteryLast');
        if (la) la.textContent = '现在';
        var po = document.getElementById('mysteryPosts');
        if (po) po.textContent = '0';
      }
    }, 120);
  });
  nl.addEventListener('click', function() {
    window.location.href = '../blank/blank-shift.html';
  });
}

<!-- ── 确认弹窗 ── -->
<div class="confirm-overlay" id="modal-confirm">
  <div class="confirm-box" style="background:#F0F0F0;border:3px solid #0D3050;width:340px;max-width:90%;box-shadow:4px 4px 12px rgba(0,0,0,0.3);">
    <div class="modal-titlebar" style="background:#0D3050;color:#fff;padding:6px 10px;font-size:11px;font-weight:bold;display:flex;justify-content:space-between;">
      <span>回声茶馆 · 确认</span>
    </div>
    <div class="modal-body">
      <div style="font-size:28px;margin-bottom:8px;">⚠️</div>
      <div id="modal-confirm-text">确认操作？</div>
    </div>
    <div class="modal-footer" style="display:flex;gap:8px;justify-content:center;">
      <button class="modal-btn" onclick="confirmResult(false)" style="background:#D0D0D0;">取消</button>
      <button class="modal-btn" onclick="confirmResult(true)" style="background:#CC0000;color:#fff;">确定</button>
    </div>
  </div>
</div>

<script>
/* ── 弹窗函数 ── */
var confirmCallback = null;
function showModal(icon, text) {
  document.getElementById('modal-icon').textContent = icon || '📌';
  document.getElementById('modal-text').innerHTML = text;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
function showConfirm(text, callback) {
  document.getElementById('modal-confirm-text').innerHTML = text;
  document.getElementById('modal-confirm').classList.add('show');
  confirmCallback = callback;
}
function confirmResult(result) {
  document.getElementById('modal-confirm').classList.remove('show');
  if (result && confirmCallback) confirmCallback();
  confirmCallback = null;
}
function showSettings() {
  showModal('⚙️',
    '<b style="font-size:13px;">设置</b><br><br>' +
    '• 当前状态：<span id="modal-login-status">未登录</span><br>' +
    '• 论坛版本：2.0.46<br>' +
    '• 最后维护：2009-06-15<br><br>' +
    '<button onclick="clearMemory()" style="padding:6px 20px;background:#CC0000;color:#fff;border:none;cursor:pointer;font:11px Verdana;margin-top:6px;">🗑️ 清除记忆（重新开始）</button>'
  );
}
function clearMemory() {
  showConfirm('确定要清除所有记忆吗？这将删除所有搜索记录和游戏进度。<br><br>这个操作<b>不可撤销</b>。', function() {
    localStorage.clear();
    showModal('🗑️', '记忆已清除。<br><br>你什么也不记得了。<br>就像第一次打开这个页面时一样。');
    var ls = document.getElementById('login-status');
    if (ls) ls.textContent = '访客';
    var ll = document.getElementById('login-link');
    if (ll) { ll.textContent = '[登录]'; ll.href = 'login.html'; }
    var lo = document.getElementById('logout-link');
    if (lo) lo.style.display = 'none';
  });
}
function doLogout() {
  localStorage.removeItem('echo_login_user');
  localStorage.removeItem('echo_login_role');
  localStorage.removeItem('echo_login_display');
  var ls = document.getElementById('login-status');
  if (ls) { ls.textContent = '访客'; ls.style.color = '#7A9BB5'; }
  var ll = document.getElementById('login-link');
  if (ll) { ll.textContent = '[登录]'; ll.href = 'login.html'; }
  var lo = document.getElementById('logout-link');
  if (lo) lo.style.display = 'none';
}
</script>
